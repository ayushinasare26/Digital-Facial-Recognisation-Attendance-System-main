{% extends "base.html" %}
{% block title %}Add Employee | FaceCheck{% endblock %}
{% block content %}
<div class="row pt-2">
    <div class="col-md-9 mx-auto">
      <div class="glass-card shadow-sm">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 card-title fs-4">Add Student & Capture Face</h4>
            <a href="/" class="btn btn-outline-secondary btn-sm">Back</a>
        </div>

        <form id="studentForm">
          <div class="row g-3">
            <div class="col-md-6"><input class="form-control bg-light border-0" name="name" placeholder="Full Name" required></div>
            <div class="col-md-3"><input class="form-control bg-light border-0" name="roll" placeholder="Student ID (Roll)"></div>
            <div class="col-md-3"><input class="form-control bg-light border-0" name="reg_no" placeholder="Registration No"></div>
            <div class="col-md-6"><input class="form-control bg-light border-0" name="class" placeholder="Department (Class)"></div>
            <div class="col-md-6"><input class="form-control bg-light border-0" name="sec" placeholder="Role (Section)"></div>
          </div>
          <div class="mt-4 d-flex gap-3">
            <button id="saveInfoBtn" type="submit" class="btn btn-primary px-4 fw-bold">Save Info</button>
            <button id="startCaptureBtn" type="button" class="btn btn-warning px-4 fw-bold" disabled>Start Capture (50)</button>
            <button id="addStudentBtn" type="button" class="btn btn-success px-4 fw-bold" disabled>Finish Setup</button>
          </div>
        </form>

        <hr class="my-4 text-muted">

        <div class="text-center">
          <video id="video" width="560" height="420" autoplay muted class="bg-light" style="border-radius:14px;border:3px solid #e2e8f0;"></video>
          <div class="mt-3 w-75 mx-auto">
            <div class="d-flex justify-content-between small fw-bold text-muted mb-1">
                <span>Capture Progress</span>
                <span id="captureStatus">0 / 50</span>
            </div>
            <div class="progress" style="height:10px;">
              <div id="progressBar" class="progress-bar bg-success" style="width:0%"></div>
            </div>
          </div>
        </div>

      </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/camera_add_student.js') }}"></script>
{% endblock %}
