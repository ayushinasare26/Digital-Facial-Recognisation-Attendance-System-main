<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}FaceCheck Attendance{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2">
</head>
<body>
<div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar position-fixed h-100 bg-white">
        <div class="sidebar-logo d-flex align-items-center p-4 pb-2">
            <i class="bi bi-person-bounding-box text-primary fs-3 me-2" style="color: #6366f1 !important;"></i>
            <div class="lh-sm">
                <div class="fw-bold fs-5 text-dark">FaceCheck</div>
                <div style="font-size: 0.75rem; font-weight: 500; color: #64748b;">Attendance</div>
            </div>
        </div>
        <nav class="sidebar-nav p-3 mt-2 d-flex flex-column gap-2">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <i class="bi bi-house-door"></i> Dashboard
            </a>
            <a href="/students_page" class="nav-item {% if '/student' in request.path %}active{% endif %}">
                <i class="bi bi-people"></i> Students
            </a>
            <a href="/mark_attendance" class="nav-item {% if request.path == '/mark_attendance' %}active{% endif %}">
                <i class="bi bi-clock-history"></i> Mark Attendance
            </a>
            <a href="/attendance_record" class="nav-item {% if '/attendance_record' in request.path %}active{% endif %}">
                <i class="bi bi-file-earmark-text"></i> Reports
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header d-flex justify-content-end align-items-center py-3 px-4">
            <div class="header-right d-flex align-items-center gap-4">
                <i class="bi bi-bell border p-2 rounded-circle text-muted shadow-sm bg-white" style="cursor:pointer;"></i>
                <div class="search-box position-relative">
                    <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                    <input type="text" class="form-control border-0 bg-light rounded-pill ps-5" placeholder="Search" style="width: 200px;">
                </div>
                <div class="user-profile d-flex align-items-center gap-2">
                    <div class="text-end">
                        <div class="fw-bold text-dark lh-sm" style="font-size: 0.9rem;">Admin</div>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=3b82f6&color=fff&rounded=true" alt="Profile" style="width: 38px; height: 38px;">
                </div>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div class="content-body px-4 pb-4">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
