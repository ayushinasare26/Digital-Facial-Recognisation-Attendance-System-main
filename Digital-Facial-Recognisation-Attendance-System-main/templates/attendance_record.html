<!doctype html>
<html>
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Attendance Records</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container my-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Attendance Records</h4>
    <div>
      <a class="btn btn-outline-primary" href="/download_csv">Download CSV</a>
      <a class="btn btn-outline-secondary" href="/">Back</a>
    </div>
  </div>

  <div class="d-flex justify-content-between mb-3 align-items-center">
    <div>
      <a href="/attendance_record?period=all" class="btn btn-sm btn-light">All</a>
      <a href="/attendance_record?period=daily" class="btn btn-sm btn-light">Daily</a>
      <a href="/attendance_record?period=weekly" class="btn btn-sm btn-light">Weekly</a>
      <a href="/attendance_record?period=monthly" class="btn btn-sm btn-light">Monthly</a>
    </div>
    <div>
      <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search by name or ID...">
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-striped">
      <thead class="table-dark">
        <tr><th>ID</th><th>Student ID</th><th>Name</th><th>Timestamp (UTC)</th></tr>
      </thead>
      <tbody>
      {% for r in records %}
        <tr>
          <td>{{ r[0] }}</td>
          <td>{{ r[1] }}</td>
          <td>
            <div class="d-flex align-items-center gap-2">
              <img
                src="{{ url_for('student_image', sid=r[1]) }}"
                class="student-thumb"
                alt="Student photo"
                onerror="this.style.display='none';"
              />
              <a href="#" class="view-student fw-bold text-decoration-none" data-id="{{ r[1] }}">{{ r[2] }}</a>
            </div>
          </td>
          <td>{{ r[3] }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>

<!-- Student Detail Modal -->
<div class="modal fade" id="studentModal" tabindex="-1" aria-labelledby="studentModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="studentModalLabel">Student Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="studentDetailContent">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Search feature
  document.getElementById('searchInput').addEventListener('keyup', function() {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll('.table tbody tr');
    
    rows.forEach(row => {
      let idCell = row.cells[1].textContent.toLowerCase();
      let nameCell = row.cells[2].textContent.toLowerCase();
      if (idCell.indexOf(filter) > -1 || nameCell.indexOf(filter) > -1) {
        row.style.display = '';
      } else {
        row.style.display = 'none';
      }
    });
  });

  // Fetch and show student details in Modal
  const currentPeriod = "{{ period }}"; // from server: all, daily, weekly, monthly
  document.querySelectorAll('.view-student').forEach(item => {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      let sid = this.getAttribute('data-id');
      let modalContent = document.getElementById('studentDetailContent');
      modalContent.innerHTML = 'Loading...';
      
      let studentModal = new bootstrap.Modal(document.getElementById('studentModal'));
      studentModal.show();
      
      fetch('/student/' + sid + '?period=' + encodeURIComponent(currentPeriod))
        .then(response => response.json())
        .then(data => {
          if(data.error) {
            modalContent.innerHTML = '<div class="alert alert-danger">' + data.error + '</div>';
          } else {
            modalContent.innerHTML = `
              <table class="table table-bordered mb-0">
                <tbody>
                  <tr>
                    <th class="bg-light">Photo</th>
                    <td>
                      <img
                        src="/student_image/${data.id}"
                        style="width:90px;height:90px;object-fit:cover;border-radius:50%;border:1px solid rgba(15,23,42,0.12);"
                        onerror="this.style.display='none';"
                      />
                    </td>
                  </tr>
                  <tr><th class="bg-light">Name</th><td>${data.name}</td></tr>
                  <tr><th class="bg-light">Student ID</th><td>${data.id}</td></tr>
                  <tr><th class="bg-light">Total sessions (${currentPeriod})</th><td>${data.total_sessions ?? 0}</td></tr>
                  <tr><th class="bg-light">Sessions attended</th><td>${data.sessions_attended ?? 0}</td></tr>
                  <tr>
                    <th class="bg-light">Attendance ratio</th>
                    <td>
                      ${(data.sessions_attended ?? 0)}/${(data.total_sessions ?? 0)} ( ${(data.attendance_percent ?? 0)}% )
                    </td>
                  </tr>
                  <tr><th class="bg-light">Roll No</th><td>${data.roll}</td></tr>
                  <tr><th class="bg-light">Class</th><td>${data.class}</td></tr>
                  <tr><th class="bg-light">Section</th><td>${data.section}</td></tr>
                  <tr><th class="bg-light">Registration No</th><td>${data.reg_no}</td></tr>
                </tbody>
              </table>
            `;
          }
        })
        .catch(err => {
          modalContent.innerHTML = '<div class="alert alert-danger">Error fetching details.</div>';
        });
    });
  });
</script>
</body>
</html>
